name: Deploy CarexLLC Frontend

on:
  push:
    branches:
      - main

jobs:
  web-deploy:
    name: Deploy to Server via FTP
    runs-on: ubuntu-latest
    steps:
    - name: Get latest code
      uses: actions/checkout@v4
      
    - name: Sync Laravel Core Files
      uses: SamKirkland/FTP-Deploy-Action@v4.3.5
      with:
        server: ${{ secrets.FTP_SERVER }}
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        local-dir: ./
        server-dir: ./carexllc/
        # Exclude public assets, node_modules, vendor and git files from core
        exclude: |
          **/.git*
          **/.git*/**
          **/node_modules/**
          **/vendor/**
          public/**
          .github/**

    - name: Sync Public Assets (to public_html)
      uses: SamKirkland/FTP-Deploy-Action@v4.3.5
      with:
        server: ${{ secrets.FTP_SERVER }}
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        local-dir: ./public/
        server-dir: ./public_html/
        exclude: |
          **/.git*
          **/.git*/**
